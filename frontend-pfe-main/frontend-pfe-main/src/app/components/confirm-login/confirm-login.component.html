<div class="confirm-login-page">
  <div class="confirm-card">
    <h2>Verification de connexion</h2>

    <div *ngIf="loading" class="loading-box">
      <div class="spinner"></div>
      <p class="info">{{ infoMessage }}</p>
    </div>

    <p *ngIf="!loading && successMessage" class="success">{{ successMessage }}</p>
    <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

    <button *ngIf="canUseOtpFallback" class="btn-otp" (click)="goToOtpFallback()">
      Continuer avec OTP
    </button>
  </div>
</div>
