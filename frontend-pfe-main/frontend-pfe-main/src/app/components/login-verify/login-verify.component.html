<section class="otp-page">
  <div class="blob blob-left"></div>
  <div class="blob blob-right"></div>

  <div class="otp-card">
    <div class="otp-hero">
      <div class="hero-logo">
        <img src="assets/img/Logo.png" alt="Logo TAV" />
      </div>
      <h2>Verification OTP</h2>
      <p>Entrez le code de verification recu pour finaliser la connexion.</p>
    </div>

    <div class="otp-form-panel">
      <h1>Confirmer la connexion</h1>
      <p class="subtext">Saisissez votre code OTP ci-dessous.</p>

      <form (ngSubmit)="verify()">
        <div class="form-group">
          <label for="email">Adresse email</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            class="form-control"
            readonly
          />
        </div>

        <div class="form-group">
          <label for="otp">Code OTP</label>
          <input
            type="text"
            id="otp"
            name="otp"
            [(ngModel)]="otp"
            class="form-control"
            placeholder="Entrez le code OTP"
            required
          />
        </div>

        <button type="submit" class="btn-verify">Verifier</button>

        <a class="back-link" routerLink="/auth/signin">Retour a la connexion</a>
      </form>
    </div>
  </div>
</section>
