<div class="overlay" *ngIf="sidebar.isOpen && isMobileViewport()" (click)="closeSidebar()"></div>

<aside class="sidebar-shell">
  <nav class="sidebar-nav">
    <div class="sidebar-brand">
      <img src="assets/img/Logo.png" alt="TAV Airports" />
    </div>

    <div class="sidebar-scroll">
      <div class="sidebar-list">
        <ng-container *ngFor="let item of sidebarItems">
          <a
            *ngIf="item.title"
            class="nav-link"
            [routerLink]="item.path"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeSidebar()"
          >
            <span class="icon-wrapper position-relative">
              <i [attr.data-feather]="item.icon" class="icon"></i>

              <span
                *ngIf="item.path === '/notifications' && notificationsCount > 0"
                class="notification-badge"
              >
                {{ notificationsCount > 99 ? '99+' : notificationsCount }}
              </span>
            </span>

            <span class="title ms-3">{{ item.title }}</span>
          </a>
        </ng-container>
      </div>

      <div class="ai-toggle-card" *ngIf="isAdmin()">
        <div class="ai-toggle-row">
          <div class="ai-toggle-title-wrap">
            <span class="ai-icon" aria-hidden="true">✈️</span>
            <span class="ai-title">Mode IA</span>
          </div>

          <label class="ai-switch" for="ai-toggle-switch" aria-label="Activer ou dÃ©sactiver le mode IA">
            <input
              id="ai-toggle-switch"
              type="checkbox"
              [ngModel]="aiEnabled"
              (ngModelChange)="onAiToggleChange($event)"
              [disabled]="aiToggleLoading"
            />
            <span class="ai-slider"></span>
          </label>
        </div>

        <p class="ai-status" [class.enabled]="aiEnabled">
          {{ aiEnabled ? "IA Activé" : "IA Désactivée" }}
        </p>
      </div>
    </div>

    <a class="nav-link logout-btn" (click)="logout()">
      <i data-feather="log-out" class="icon"></i>
      <span class="title ms-3">Logout</span>
    </a>
  </nav>
</aside>
